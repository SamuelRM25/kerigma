services:
  - type: web
    name: kerygma-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    autoDeploy: true
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable